<!DOCTYPE html>
<html>
<head>
  <title>Advanced URL Manager</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: auto; padding: 20px; }
    input, button { padding: 8px; margin: 5px; }
    .item { border-bottom: 1px solid #ddd; padding: 8px; }
    .tags { color: gray; font-size: 12px; }
    .error { color: red; }
  </style>
</head>
<body>

<h2>🔗 URL Manager</h2>

<input id="url" placeholder="Enter URL">
<input id="tags" placeholder="Tags (comma separated)">
<button onclick="add()">Add</button>

<br>
<input id="search" placeholder="Search..." oninput="render()">

<div id="list"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbynYiLxAus6EnIrUHO_vzM6C117BZcuJCQecUTCqGk0JTXJpMCxr-ke35qprqpc8A/exec"; 
let urls = [];

/**
 * Load all URLs from backend
 */
async function load() {
  try {
    const res = await fetch(API, { method: "GET", headers: { "Content-Type": "application/json" } });
    
    if (!res.ok) throw new Error(`HTTP error ${res.status}`);
    
    const data = await res.json();

    if (data.error) throw new Error(data.error);
    if (!Array.isArray(data)) throw new Error("Invalid data format from server");

    urls = data;
    render();
  } catch (err) {
    console.error(err);
    document.getElementById("list").innerHTML = `<p class="error">Failed to load URLs: ${err.message}</p>`;
  }
}

/**
 * Add a new URL
 */
async function add() {
  const urlInput = document.getElementById("url").value.trim();
  const tagsInput = document.getElementById("tags").value
                    .split(",")
                    .map(t => t.trim())
                    .filter(t => t);

  if (!urlInput) {
    alert("Please enter a valid URL");
    return;
  }

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "add", url: urlInput, tags: tagsInput })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // Clear input fields
    document.getElementById("url").value = "";
    document.getElementById("tags").value = "";

    load();
  } catch (err) {
    console.error(err);
    alert(`Failed to add URL: ${err.message}`);
  }
}

/**
 * Delete a URL
 */
async function remove(id) {
  if (!confirm("Are you sure you want to delete this URL?")) return;

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "delete", id })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    load();
  } catch (err) {
    console.error(err);
    alert(`Failed to delete URL: ${err.message}`);
  }
}

/**
 * Edit a URL
 */
async function edit(id) {
  const item = urls.find(u => u.id === id);
  if (!item) return;

  const newUrl = prompt("Edit URL:", item.url);
  if (newUrl === null) return; // user canceled
  const trimmedUrl = newUrl.trim();
  if (!trimmedUrl) {
    alert("URL cannot be empty");
    return;
  }

  const newTagsInput = prompt("Edit tags (comma separated):", item.tags.join(", "));
  if (newTagsInput === null) return; // user canceled
  const newTags = newTagsInput.split(",").map(t => t.trim()).filter(t => t);

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "edit", id, url: trimmedUrl, tags: newTags })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    load();
  } catch (err) {
    console.error(err);
    alert(`Failed to edit URL: ${err.message}`);
  }
}

/**
 * Render URL list
 */
function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");
  list.innerHTML = "";

  const filtered = urls.filter(item =>
    item.url.toLowerCase().includes(search) ||
    item.tags.join(",").toLowerCase().includes(search)
  );

  if (filtered.length === 0) {
    list.innerHTML = "<p>No URLs found</p>";
    return;
  }

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <a href="${item.url}" target="_blank">${item.url}</a>
      <div class="tags">${item.tags.join(", ")}</div>
      <small>${new Date(item.created).toLocaleString()}</small><br>
      <button onclick="edit(${item.id})">✏️ Edit</button>
      <button onclick="remove(${item.id})">🗑 Delete</button>
    `;

    list.appendChild(div);
  });
}

// Initial load
load();
</script>

</body>
</html>
