<!DOCTYPE html>
<html>
<head>
  <title>Advanced URL Manager</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: auto; }
    input, button { padding: 8px; margin: 5px; }
    .item { border-bottom: 1px solid #ddd; padding: 8px; }
    .tags { color: gray; font-size: 12px; }
  </style>
</head>
<body>

<h2>🔗 URL Manager</h2>

<input id="url" placeholder="Enter URL">
<input id="tags" placeholder="Tags (comma separated)">
<button onclick="add()">Add</button>

<br>
<input id="search" placeholder="Search..." oninput="render()">

<div id="list"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzJcW2Hq3W6nYGabMpKIZ2UnRDFa_JIh_Ebnv9UVu7GtxbKVt4FEH-5gGUg1ntXaSQp/exec";
let urls = [];

async function load() {
  const res = await fetch(API, {
    method: "GET",
    headers: {
      "Content-Type": "application/json"
    }
  });
  const data = await res.json();
  urls = data;
  render();
}

async function add() {
  const url = document.getElementById("url").value;
  const tags = document.getElementById("tags").value.split(",");

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "add",
      url,
      tags
    })
  });

  load();
}

async function remove(id) {
  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "delete",
      id
    })
  });

  load();
}

async function edit(id) {
  const newUrl = prompt("Edit URL:");
  const newTags = prompt("Edit tags (comma separated):");

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "edit",
      id,
      url: newUrl,
      tags: newTags.split(",")
    })
  });

  load();
}

function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");
  list.innerHTML = "";

  urls
    .filter(item =>
      item.url.toLowerCase().includes(search) ||
      item.tags.join(",").toLowerCase().includes(search)
    )
    .forEach(item => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <a href="${item.url}" target="_blank">${item.url}</a>
        <div class="tags">${item.tags.join(", ")}</div>
        <small>${new Date(item.created).toLocaleString()}</small><br>
        <button onclick="edit(${item.id})">✏️</button>
        <button onclick="remove(${item.id})">🗑</button>
      `;

      list.appendChild(div);
    });
}

load();
</script>

</body>
</html>
